system_title: LinkMind

models:

  # qwen (TongyiQianwen) is an advanced large-scale language model developed by Alibaba Cloud
  - name: qwen
    type: Alibaba
    enable: true
    model:  qwen-turbo,
            qwen-plus,qwen-max,qwen-max-1201,qwen-max-longcontext,qwen3.5-plus,
            asr,
            vision,
            ocr
    # Options for default, llm, voice, vision and ocr, line by line above.
    driver: ai.wrapper.impl.AlibabaAdapter
    # help document https://help.aliyun.com/document_detail/2712195.html?spm=a2c4g.2712576.0.0.733b3374np40s0
    api_key: your-api-key # url address  https://bailian.console.aliyun.com/#/home
    access_key_id: your-access-key-id
    access_key_secret: your-access-key-secret

  # DeepSeek is an open source large language model launched by DeepSeek.
  - name: deepseek
    type: DeepSeek
    enable: true
    model: deepseek-chat
    driver: ai.llm.adapter.impl.DeepSeekAdapter
    api_address: https://api.deepseek.com/chat/completions
               # https://ark.cn-beijing.volces.com/api/v3/chat/completions
               # https://dashscope.aliyuncs.com/compatible-mode/v1
               # https://qianfan.baidubce.com/v2/chat/completions
               # https://api.lkeap.cloud.tencent.com/v1
    api_key: your-api-key # url address https://platform.deepseek.com/api_keys

include_models: model.yml


stores:

  vector:
    # Chroma is an AI-native open-source embedding database
    # The official website is https://www.trychroma.com/
    - name: chroma
      driver: ai.vector.impl.ChromaVectorStore
      default_category: default
      similarity_top_k: 10
      similarity_cutoff: 0.5
      parent_depth: 1
      child_depth: 1
      url: http://localhost:8000

  rag: # RAG enhances large language models by integrating external knowledge retrieval.
    vector: chroma
    term: elastic
    graph: landing
    enable: false
    priority: 10
    track: true
    html: true
    default: "Please give prompt more precisely"

  medusa: # Medusa is a caching tool designed to accelerate the response of large models.
    enable: false
    algorithm: hash,graph,llm
    aheads: 1
    producer_thread_num: 1
    consumer_thread_num: 2
    flush: false
    cache_hit_window: 16
    cache_hit_ratio: 0.3
    temperature_tolerance: 0.1
    inits: '你好,
            介绍一下你自己,
            感冒发烧了，除了吃药还有哪些方法？,
            预测新能源汽车未来 5 年的发展趋势未来的发展趋势？
            推荐一些生日礼物,
            健康减脂食谱推荐,
            提供一些第一次一个人出门旅行的建议,
            我要去旅游，推荐几个小众好玩的地方,
            给我推荐一些中国必吃的美食,
            推荐一些好看的电影'

include_stores: store.yml


functions:
  embedding:
    - backend: qwen
      type: Qwen
      api_key: you-api-key

  chat:
    route: best((landing&qwen),(kimi|chatgpt))
    filter: sensitive,priority,stopping,continue
    backends:
      - backend: landing
        model: cascade
        enable: true
        stream: true
        protocol: completion
        priority: 350

      - backend: kimi
        model: moonshot-v1-8k
        enable: false
        stream: true
        protocol: completion
        priority: 150

      - backend: chatgpt
        model: gpt-3.5-turbo
        enable: false
        stream: true
        protocol: completion
        priority: 120


  translate:
    - backend: ernie
      model: translate
      enable: true
      priority: 10

  speech2text:
    - backend: qwen
      model: asr
      enable: true
      priority: 10

  text2speech:
    - backend: landing
      model: tts
      enable: true
      priority: 10

  speech2clone:
    - backend: doubao
      model: openspeech
      enable: true
      priority: 10
      others: your-speak-id

  text2image:
    - backend: spark
      model: tti
      enable: true
      priority: 10
    - backend: ernie
      model: Stable-Diffusion-XL
      enable: true
      priority: 5

  image2text:
    - backend: ernie
      model: Fuyu-8B
      enable: true
      priority: 10

  image2enhance:
    - backend: ernie
      model: enhance
      enable: true
      priority: 10

  text2video:
    - backend: landing
      model: video
      enable: true
      priority: 10

  image2video:
    - backend: qwen
      model: vision
      enable: true
      priority: 10

  video2track:
    - backend: landing
      model: video
      enable: true
      priority: 10

  video2enhance:
    - backend: qwen
      model: vision
      enable: true
      priority: 10

  doc2ocr:
    - backend: qwen
      model: qwen-vl-ocr
      enable: true
      priority: 15

  doc2instruct:
    - backend: landing
      model: cascade
      enable: true
      priority: 10

  text2sql:
    - backend: landing
      model: cascade
      enable: true
      priority: 10

  doc2ext:
    - backend: landing
      model: cascade
      enable: true
      priority: 10

  doc2struct:
    - backend: landing
      model: cascade
      enable: true
      priority: 10

  text2qa:
    enable: true
    model: cascade

# The following is the configuration of agents, name is the name of the agent,
# type is the type of the agent, class is the implement class of the agent.
agents:
  # Agent for stock queries, providing stock market information, analysis, and related services.
  - name: stock
    wrong_case: 抱歉
    token: your-token
    app_id: your-app-id
    driver: ai.agent.chat.coze.CozeAgent

  # Agent for weather queries, helping users obtain real-time weather information and forecasts.
  - name: weather
    token: your-token
    driver: ai.agent.customer.WeatherAgent

include_agents: agent.yml


mcps:
  # set default driver
  servers:
    - name: amap_mcp
      url: https://mcp.amap.com/sse?key=your-key

include_mcps: mcp.yml




# The following is the configuration of workers, name is the name of the worker,

skills:
  roots: ["classpath:skills"]
  workspace: "skills"
  # server cli  block
  rule: cli
  items:
    - name: extract_content_with_image
      description: 将本地 PDF、TXT、Word、PPT 文件分割为文本和图片chunk。
      rule: server
    - name: pdf
      description: Use this skill whenever the user wants to do anything with PDF files. This includes reading or extracting text/tables from PDFs, combining or merging multiple PDFs into one, splitting PDFs apart, rotating pages, adding watermarks, creating new PDFs, filling PDF forms, encrypting/decrypting PDFs, extracting images, and OCR on scanned PDFs to make them searchable. If the user mentions a .pdf file or asks to produce one, use this skill.
    - name: docx
      description: "Use this skill whenever the user wants to create, read, edit, or manipulate Word documents (.docx files). Triggers include: any mention of 'Word doc', 'word document', '.docx', or requests to produce professional documents with formatting like tables of contents, headings, page numbers, or letterheads. Also use when extracting or reorganizing content from .docx files, inserting or replacing images in documents, performing find-and-replace in Word files, working with tracked changes or comments, or converting content into a polished Word document. If the user asks for a 'report', 'memo', 'letter', 'template', or similar deliverable as a Word or .docx file, use this skill. Do NOT use for PDFs, spreadsheets, Google Docs, or general coding tasks unrelated to document generation."
    - name: pptx
      description: "Use this skill any time a .pptx file is involved in any way — as input, output, or both. This includes: creating slide decks, pitch decks, or presentations; reading, parsing, or extracting text from any .pptx file (even if the extracted content will be used elsewhere, like in an email or summary); editing, modifying, or updating existing presentations; combining or splitting slide files; working with templates, layouts, speaker notes, or comments. Trigger whenever the user mentions \"deck,\" \"slides,\" \"presentation,\" or references a .pptx filename, regardless of what they plan to do with the content afterward. If a .pptx file needs to be opened, created, or touched, use this skill."
    - name: xlsx
      description: "Use this skill any time a spreadsheet file is the primary input or output. This means any task where the user wants to: open, read, edit, or fix an existing .xlsx, .xlsm, .csv, or .tsv file (e.g., adding columns, computing formulas, formatting, charting, cleaning messy data); create a new spreadsheet from scratch or from other data sources; or convert between tabular file formats. Trigger especially when the user references a spreadsheet file by name or path — even casually (like \"the xlsx in my downloads\") — and wants something done to it or produced from it. Also trigger for cleaning or restructuring messy tabular data files (malformed rows, misplaced headers, junk data) into proper spreadsheets. The deliverable must be a spreadsheet file. Do NOT trigger when the primary deliverable is a Word document, HTML report, standalone Python script, database pipeline, or Google Sheets API integration, even if tabular data is involved."
    - name: screenshot-1.0.1
      description: "Capture, inspect, and compare screenshots of screens, windows, regions, web pages, simulators, and CI runs with the right tool, wait strategy, viewport, and output format. Use when (1) you need screenshots for debugging, QA, docs, bug reports, or visual review; (2) desktop, browser, simulator, or headless capture is involved; (3) stable screenshots require fixed viewport, settling, masking, or animation control."
    - name: cn-web-search-2.2.0
      description: 中文网页搜索 - 聚合 17 个免费搜索引擎，无需 API Key，纯网页抓取，支持公众号/财经/技术/学术/知识搜索。
    - name: baidu-search-1.1.3
      description: Search the web using Baidu AI Search Engine (BDSE). Use for live information, documentation, or research topics.
    - name: google-maps-3.2.0
      description: "Google Maps integration for OpenClaw with Routes API. Use for: (1) Distance/travel time calculations with traffic prediction, (2) Turn-by-turn directions, (3) Distance matrix between multiple points, (4) Geocoding addresses to coordinates and reverse, (5) Places search and details, (6) Transit planning with arrival times. Supports future departure times, traffic models (pessimistic/optimistic), avoid options (tolls/highways), and multiple travel modes (driving/walking/bicycling/transit)."
    - name: feishu-1.0.5
      description: 飞书深度集成技能。不是简单的消息桥接，而是你的数字指挥中枢。专为中国企业高压协作环境设计，理解“分寸”与“效率”两套并行规则，把消息、审批、会议、文档、多维表格、日程与邮箱，压缩成有优先级、可执行的行动链。
    - name: imap-smtp-email-0.0.10
      description: Read and send email via IMAP/SMTP. Check for new/unread messages, fetch content, search mailboxes, mark as read/unread, and send emails with attachments. Supports multiple accounts. Works with any IMAP/SMTP server including Gmail, Outlook, 163.com, vip.163.com, 126.com, vip.126.com, 188.com, and vip.188.com.
    - name: docker-1.0.4
      description: "Docker containers, images, Compose stacks, networking, volumes, debugging, production hardening, and the commands that keep real environments stable. Use when (1) the task touches Docker, Dockerfiles, images, containers, or Compose; (2) build reliability, runtime behavior, logs, ports, volumes, or security matter; (3) the agent needs Docker guidance and should apply it by default."
    - name: typescript-skills-1.0.6
      description: Provide best-practice coding conventions and generate standards-compliant TypeScript code.
    - name: webapp-testing
      description: Toolkit for interacting with and testing local web applications using Playwright. Supports verifying frontend functionality, debugging UI behavior, capturing browser screenshots, and viewing browser logs.
    - name: ws-agent-browser-1.0.0
      description: 浏览器智能控制。自动化操作、截图、填表、数据抓取。
    - name: skill-finder-1.1.5
      description: "Find, compare, and install agent skills across ClawHub and Skills.sh when the user needs new capabilities, better workflows, stronger tools, or safer alternatives. Use when (1) they ask how to do something, how to improve or automate it, or what to install; (2) a skill could extend the agent, replace a weak manual approach, or close a capability gap; (3) you need the best-fit option, not just a direct answer."
    

  # agent is the agent used by the worker, class is the implement class of the worker.
  workers:
    - name: qq-robot
      agent: qq
      route: pass(qq)
      worker: ai.worker.social.RobotWorker

    - name: wechat-robot
      agent: wechat
      route: pass(wechat)
      worker: ai.worker.social.RobotWorker

    - name: ding-robot
      agent: ding
      route: pass(ding)
      worker: ai.worker.social.RobotWorker

    # Example for Airport Enhancement
    - name: asr4flights
      worker: ai.worker.social.Asr4FlightsWorker

    - name: BestWorker
      route: best(weather&oil)
      worker: ai.worker.DefaultBestWorker

    - name: appointedWorker
      route: pass(%)
      worker: ai.worker.DefaultAppointWorker

  pnps:
    # pnp for QQ chat application automation, enabling social interactions and services.
    - name: qq
      api_key: your-api-key
      driver: ai.pnps.social.QQPnp

include_pnps: pnp.yml


routers:
  - name: best
    rule: (|,&)
    # A|B -> polling,  A or B, means randomly round-robin within A and B;
    # A,B -> failover, first A, if A fail, then B;
    # A&B -> parallel, call A and B concurrently, choose the proper only one result;
    # The rule could be combined like ((A&B&C),(E|F)) which means first call ABC simultaneously, if fail, then call E or F randomly.

  - name: pass
    rule: (%)
    # % is a wildcard to represent agent name.
    # if specified, invoke this agent.
    # if just % is given, % would be decided by parameter at calling time.





# Filter rules for sensitive words or sentence, with priority and etc.
filters:
  # Sensitive words filter
  - name: sensitive
    groups:
      # Mask sensitive words/sentences with stars "*"
      - level: mask
        rules: 'openai,FLG,
                维尼熊,
                เสรีภาพ,ประชาธิปไตย,กษัตริย์,รัฐประหาร,สื่อ,ม็อบ,อิสรภาพ'
      # Erase sensitive words/sentences
      - level: erase
        # Rule Explanation: A single rule supports regular expressions but requires using \\, to replace the original ,
        rules: 'your context,
                根据\w{0\\,6}上下文,依据您提供的上下文,
                ぶんみゃくにもとづいて,せいじてき,いけん,しそう'
      # Block the output of sensitive words/sentences
      - level: block
        rules: 'shit,CNM,
                六四,
                цензура,протест,революция,права человека'
  # Index words with high priority
  - name: priority
    rules: 'car,weather,
            社*保'
  # Keywords to mark the lifecycle end of a multiple round conversation
  # Or the beginning of a new conversation.
  - name: stopping
    rules: 'bye,
            开始*'
  # Keywords to mark the continuation of conversation, within multiple round.
  - name: continue
    rules: 'about,next,then,
            资料'
